<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamini Digital - Secure Admin Panel</title>
    <link rel="manifest" href="admin-manifest.json">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', 'Segoe UI', sans-serif; background-color: #f4f7f6; color: #333; }
        
        /* 🔒 লগইন স্ক্রিন স্টাইল */
        #login-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #2c3e50; color: white; padding: 20px; }
        .login-box { background: white; padding: 40px 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; width: 100%; max-width: 350px; color: #333; }
        .login-box h2 { margin-bottom: 20px; color: #2c3e50; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #bdc3c7; border-radius: 8px; font-size: 18px; text-align: center; letter-spacing: 5px; outline: none; transition: 0.3s; }
        .login-box input:focus { border-color: #3498db; }
        .login-box button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .login-box button:hover { background: #2980b9; }

        /* 📱 অ্যাপ ইনস্টল বাটন */
        #installAdminBtn { display: none; background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; margin: 15px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-size: 14px; animation: popIn 0.5s ease; }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* মূল অ্যাডমিন কন্টেন্ট */
        #admin-content { display: none; }
        .navbar { background: #2c3e50; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .navbar h1 { font-size: 20px; font-weight: 600; letter-spacing: 1px; }
        .navbar span { font-size: 12px; background: #e74c3c; padding: 4px 10px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .page-title { margin-bottom: 20px; color: #2c3e50; font-size: 22px; font-weight: 600; text-align: center; }
        
        /* টেবিল স্টাইল */
        .table-container { background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        thead { background-color: #34495e; color: white; }
        th { padding: 15px; font-weight: 600; border-right: 1px solid #465c70; text-align: center; }
        td { padding: 15px; border-bottom: 1px solid #eee; border-right: 1px solid #eee; vertical-align: top; }
        tbody tr:nth-child(even) { background-color: #f9fbfc; }
        tr.completed-row { background-color: #fafffa !important; opacity: 0.8; }
        tr.canceled-row { background-color: #fff5f5 !important; opacity: 0.7; }
        
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-block; }
        .badge-pending { background: #fff3cd; color: #856404; }
        .badge-completed { background: #d4edda; color: #155724; }
        .badge-canceled { background: #f8d7da; color: #721c24; }
        
        .book-item { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px dashed #ccc; }
        .book-name { font-weight: 600; color: #2980b9; font-size: 14px; display: block; }
        .book-meta { font-size: 12px; color: #7f8c8d; display: block; }
        
        .actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .btn { padding: 6px 12px; border-radius: 6px; border: none; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; color: white; }
        .btn-complete { background: #2ecc71; }
        .btn-cancel { background: #f39c12; }
        .btn-delete { background: #e74c3c; }
        
        .empty-state { text-align: center; padding: 40px; color: #7f8c8d; font-size: 16px; }

        @media screen and (max-width: 768px) {
            table, thead, tbody, th, td, tr { display: block; width: 100%; }
            thead { display: none; }
            tbody tr { margin-bottom: 15px; border: 2px solid #3498db; background: white; border-radius: 10px; overflow: hidden; }
            td { text-align: right; padding-left: 40%; position: relative; border-bottom: 1px solid #ecf0f1; }
            td::before { content: attr(data-label); position: absolute; left: 15px; font-weight: bold; text-align: left; }
            td:nth-child(2) { text-align: left; padding-left: 15px; background: #f8f9fa; }
            td:nth-child(2)::before { display: none; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>🔐 সিকিউরিটি পিন দিন</h2>
            <input type="password" id="admin-pin" placeholder="PIN" inputmode="numeric" onkeypress="handleLoginEnter(event)">
            <button onclick="checkPin()">লগইন করুন</button>
        </div>
    </div>

    <div id="admin-content">
        <div class="navbar">
            <h1>Kamini Digital</h1>
            <span onclick="logout()">লগ আউট 🚪</span>
        </div>

        <div style="text-align: center;">
            <button id="installAdminBtn">📲 অ্যাডমিন অ্যাপটি ইনস্টল করুন</button>
        </div>

        <div class="container">
            <h2 class="page-title">📦 সমস্ত অর্ডার লিস্ট</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 20%;">কাস্টমার ও সময়</th>
                            <th style="width: 40%;">বইয়ের বিবরণ</th>
                            <th style="width: 15%;">স্ট্যাটাস</th>
                            <th style="width: 25%;">অ্যাকশন</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body">
                        <tr>
                            <td colspan="4" class="empty-state">ডেটা লোড হচ্ছে, দয়া করে অপেক্ষা করুন...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // 🛑 সিকিউরিটি পিন
        const SECRET_PIN = "1234";

        // 🔥 ফায়ারবেস সেটআপ
        const firebaseConfig = {
            apiKey: "AIzaSyC79rsKemc3qthh8-mJ29HM1ni7Q9mIb3Q",
            authDomain: "kamini-digital.firebaseapp.com",
            projectId: "kamini-digital",
            storageBucket: "kamini-digital.firebasestorage.app",
            messagingSenderId: "354990280556",
            appId: "1:354990280556:web:5e3bf259cdddaf7fa3ad49"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 📱 PWA অ্যাপ ইনস্টল লজিক
        let deferredPrompt;
        const installBtn = document.getElementById('installAdminBtn');
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('admin-sw.js').catch(err => console.log(err));
        }
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'inline-block';
        });
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                await deferredPrompt.userChoice;
                deferredPrompt = null;
                installBtn.style.display = 'none';
            }
        });

        // 🔑 লগইন ফাংশন
        window.onload = () => {
            if (sessionStorage.getItem("isAdminLoggedIn") === "true") {
                showAdminPanel();
            }
        };

        function handleLoginEnter(e) {
            if (e.key === 'Enter') checkPin();
        }

        function checkPin() {
            const enteredPin = document.getElementById('admin-pin').value;
            if (enteredPin === SECRET_PIN) {
                sessionStorage.setItem("isAdminLoggedIn", "true");
                showAdminPanel();
            } else {
                alert("❌ পিন ভুল হয়েছে!");
                document.getElementById('admin-pin').value = "";
            }
        }

        function showAdminPanel() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            fetchOrders();
        }

        function logout() {
            sessionStorage.removeItem("isAdminLoggedIn");
            location.reload();
        }

        // 📦 ডেটাবেস থেকে অর্ডার নিয়ে আসা
        function fetchOrders() {
            const tableBody = document.getElementById('admin-table-body');
            db.collection("book_orders").orderBy("order_time", "desc").onSnapshot((querySnapshot) => {
                tableBody.innerHTML = "";
                if (querySnapshot.empty) {
                    tableBody.innerHTML = "<tr><td colspan='4' class='empty-state'>📭 কোনো অর্ডার নেই।</td></tr>";
                    return;
                }
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    let timeString = data.order_time ? data.order_time.toDate().toLocaleString('bn-BD') : 'অজানা সময়';
                    const status = data.status || 'pending';
                    
                    let statusBadge = `<span class="badge badge-pending">⏳ পেন্ডিং</span>`;
                    let rowClass = '';
                    let actionBtns = `
                        <button class="btn btn-complete" onclick="updateStatus('${doc.id}', 'completed')">✔️ সম্পন্ন</button>
                        <button class="btn btn-cancel" onclick="updateStatus('${doc.id}', 'canceled')">❌ বাতিল</button>
                        <button class="btn btn-delete" onclick="deleteOrder('${doc.id}')">🗑️</button>
                    `;

                    if (status === 'completed') {
                        statusBadge = `<span class="badge badge-completed">✅ ডেলিভারি সম্পন্ন</span>`;
                        rowClass = 'completed-row';
                        actionBtns = `<button class="btn btn-delete" onclick="deleteOrder('${doc.id}')">🗑️ মুছুন</button>`;
                    } else if (status === 'canceled') {
                        statusBadge = `<span class="badge badge-canceled">🚫 বাতিল</span>`;
                        rowClass = 'canceled-row';
                        actionBtns = `<button class="btn btn-delete" onclick="deleteOrder('${doc.id}')">🗑️ মুছুন</button>`;
                    }

                    let booksHtml = "";
                    data.books.forEach(b => {
                        booksHtml += `<div class="book-item"><span class="book-name">📘 ${b.book_name}</span></div>`;
                    });

                    const tr = document.createElement("tr");
                    if(rowClass) tr.className = rowClass;
                    tr.innerHTML = `
                        <td data-label="কাস্টমার:"><strong>👤 ${data.customer_name}</strong><br><small>${timeString}</small></td>
                        <td data-label="বইসমূহ:">${booksHtml}</td>
                        <td data-label="স্ট্যাটাস:" style="text-align: center;">${statusBadge}</td>
                        <td data-label="অ্যাকশন:"><div class="actions">${actionBtns}</div></td>
                    `;
                    tableBody.appendChild(tr);
                });
            }, (error) => {
                console.error(error);
                tableBody.innerHTML = "<tr><td colspan='4' class='empty-state'>⚠️ ডেটা লোড করতে সমস্যা হয়েছে।</td></tr>";
            });
        }

        function updateStatus(id, newStatus) {
            if(confirm("আপনি কি নিশ্চিত?")) db.collection("book_orders").doc(id).update({ status: newStatus });
        }

        function deleteOrder(id) {
            if(confirm("চিরতরে মুছে ফেলবেন?")) db.collection("book_orders").doc(id).delete();
        }
    </script>
</body>
</html>
