<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamini Digital Studio</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f8ff; text-align: center; margin: 0; padding: 20px; transition: 0.3s; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        .contact { color: #007bff; font-weight: bold; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; background: #fff; }
        th { background-color: #007bff; color: white; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid #ddd; font-weight: bold; color: #333; }
        .whatsapp-btn { background-color: #25D366; color: white; padding: 12px 20px; border-radius: 30px; text-decoration: none; display: inline-block; margin-top: 15px; font-weight: bold; }
        .address-box { border: 2px solid #e74c3c; border-radius: 10px; padding: 15px; margin-top: 20px; background: #fff5f5; }
        .lang-btn { padding: 8px 15px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; background: #e74c3c; color: white; font-weight: bold; }
        .color-btn { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #ddd; cursor: pointer; margin: 5px; display: inline-block; }
    </style>
</head>
<body id="mainBody">

    <div style="position: fixed; top: 10px; right: 10px;">
        <div class="color-btn" style="background: #f0f8ff;" onclick="changeBg('#f0f8ff')"></div>
        <div class="color-btn" style="background: #ffe4e1;" onclick="changeBg('#ffe4e1')"></div>
        <div class="color-btn" style="background: #2c3e50;" onclick="changeBg('#2c3e50')"></div>
    </div>

    <div class="container">
        <h1 id="title">কামিনী স্কুল লেন ডিজিটাল স্টুডিও</h1>
        <p id="greet" style="font-weight: bold; color: #d35400;">শুভ দুপুর! 🌤️</p>
        <p class="contact">Contact: 9019863904</p>

        <table>
            <thead>
                <tr>
                    <th id="th-service">সার্ভিসের নাম</th>
                    <th id="th-rate">রেট (টাকায়)</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr><td>জেরক্স (B&W)</td><td>১.০০</td></tr>
                <tr><td>প্রিন্ট আউট (B&W)</td><td>৫.০০</td></tr>
                <tr><td>পাসপোর্ট ফটো (৫ কপি)</td><td>৩০.০০</td></tr>
            </tbody>
        </table>

        <a href="https://wa.me/919019863904" class="whatsapp-btn">🟢 Send Photo on WhatsApp</a>

        <div class="address-box">
            <h3 id="addr-title" style="color: #c0392b; margin: 0;">আমাদের স্টুডিওর ঠিকানা</h3>
            <p id="addr-text"><b>২০, কামিনী স্কুল লেন, হাওড়া</b></p>
            <a href="https://maps.google.com" style="color: white; background: #e74c3c; padding: 5px 10px; border-radius: 5px; text-decoration: none;">সরাসরি ম্যাপে দেখুন</a>
        </div>

        <div style="margin-top: 25px;">
            <button class="lang-btn" onclick="setLang('bn')">বাংলা</button>
            <button class="lang-btn" onclick="setLang('en')">English</button>
            <button class="lang-btn" onclick="setLang('hi')">हिन्दी</button>
        </div>
    </div>

    <script>
        function changeBg(color) { document.getElementById('mainBody').style.backgroundColor = color; }

        function setLang(lang) {
            const data = {
                'en': { title: "Kamini School Ln Digital Studio", greet: "Good Afternoon! 🌤️", service: "Service Name", rate: "Rate (INR)", addr: "Our Address", rows: [["Xerox (B&W)", "1.00"], ["Print (B&W)", "5.00"], ["Passport Photo", "30.00"]] },
                'hi': { title: "कामिनी डिजिटल स्टूडियो", greet: "शुभ दोपहर! 🌤️", service: "सेवा का नाम", rate: "दर (रुपये)", addr: "हमारा पता", rows: [["जेरॉक्स", "1.00"], ["प्रिंट", "5.00"], ["पासपोर्ट फोटो", "30.00"]] },
                'bn': { title: "কামিনী স্কুল লেন ডিজিটাল স্টুডিও", greet: "শুভ দুপুর! 🌤️", service: "সার্ভিসের নাম", rate: "রেট (টাকায়)", addr: "আমাদের ঠিকানা", rows: [["জেরক্স (B&W)", "১.০০"], ["প্রিন্ট আউট (B&W)", "৫.০০"], ["পাসপোর্ট ফটো", "৩০.০০"]] }
            };

            document.getElementById('title').innerText = data[lang].title;
            document.getElementById('greet').innerText = data[lang].greet;
            document.getElementById('th-service').innerText = data[lang].service;
            document.getElementById('th-rate').innerText = data[lang].rate;
            document.getElementById('addr-title').innerText = data[lang].addr;

            let newRows = "";
            data[lang].rows.forEach(row => {
                newRows += `<tr><td>${row[0]}</td><td>${row[1]}</td></tr>`;
            });
            document.getElementById('table-body').innerHTML = newRows;
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
        }
    </script>
</body>
</html>
