<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamini Digital</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg-color: #f0f8ff; --card-bg: #ffffff; --text-color: #2c3e50; --btn-color: #e74c3c; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); text-align: center; margin: 0; padding: 15px; transition: 0.4s; }
        .container { background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 500px; margin: auto; transition: 0.4s; }
        
        #installBtn { display: none; background: var(--btn-color); color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; margin: 20px 0; border-radius: 10px; overflow: hidden; background: rgba(255,255,255,0.1); }
        th { background-color: var(--btn-color); color: white; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid rgba(0,0,0,0.1); font-weight: bold; }
        
        .whatsapp-btn { background-color: #25D366; color: white; padding: 15px 25px; border-radius: 50px; text-decoration: none; display: inline-block; margin-top: 15px; font-weight: bold; }
        .theme-panel { margin: 15px 0; display: flex; justify-content: center; gap: 15px; }
        .color-dot { width: 40px; height: 40px; border-radius: 50%; border: 3px solid white; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .lang-btn { padding: 10px 18px; margin: 5px; border: none; border-radius: 8px; cursor: pointer; background: var(--btn-color); color: white; font-weight: bold; }
        
        #qr-section { margin-top: 30px; background: white; padding: 20px; border-radius: 15px; max-width: 300px; margin: 20px auto; color: #2c3e50; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #qr-image { width: 100%; max-width: 200px; border-radius: 10px; margin-top: 10px; display: block; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body id="mainBody">

    <button id="installBtn">📲 Install Kamini Digital App</button>

    <div class="theme-panel">
        <div class="color-dot" style="background: #f0f8ff;" onclick="setTheme('#f0f8ff', '#ffffff', '#2c3e50')"></div>
        <div class="color-dot" style="background: #1a1a1a;" onclick="setTheme('#1a1a1a', '#2d2d2d', '#ffffff')"></div>
        <div class="color-dot" style="background: #e74c3c;" onclick="setTheme('#e74c3c', '#c0392b', '#ffffff')"></div>
    </div>

    <div class="container">
        <h1 id="title">কামিনী ডিজিটাল</h1>
        <p id="greet" style="font-weight: bold;">স্বাগতম! 🌤️</p>
        <p id="contact-text">যোগাযোগ: 9019863904</p>

        <table>
            <thead>
                <tr><th id="th-service">সার্ভিসের নাম</th><th id="th-rate">রেট (টাকায়)</th></tr>
            </thead>
            <tbody id="table-body">
                <tr><td>জেরক্স (B&W)</td><td>১.০০</td></tr>
                <tr><td>প্রিন্ট আউট (B&W)</td><td>৫.০০</td></tr>
                <tr><td>পাসপোর্ট ফটো (৫ কপি)</td><td>৩০.০০</td></tr>
            </tbody>
        </table>

        <a href="https://wa.me/919019863904" class="whatsapp-btn">🟢 WhatsApp-এ ছবি পাঠান</a>

        <div class="btn-group" style="margin-top: 25px;">
            <button class="lang-btn" onclick="setLang('bn')">বাংলা</button>
            <button class="lang-btn" onclick="setLang('en')">English</button>
            <button class="lang-btn" onclick="setLang('hi')">हिन्दी</button>
        </div>
    </div>

    <div id="qr-section">
        <p>🔳 স্ক্যান করে অ্যাপ ইন্সটল করুন</p>
        <img id="qr-image" src="qrcode.png" alt="QR Code">
    </div>

    <script>
        function setTheme(bg, card, text) {
            document.documentElement.style.setProperty('--bg-color', bg);
            document.documentElement.style.setProperty('--card-bg', card);
            document.documentElement.style.setProperty('--text-color', text);
        }

        function setLang(lang) {
            const data = {
                'en': { title: "Kamini Digital", greet: "Welcome!", service: "Service", rate: "Price", rows: [["Xerox", "1.00"], ["Print", "5.00"], ["Passport Photo", "30.00"]] },
                'hi': { title: "कामिनी डिजिटल", greet: "नमस्ते!", service: "सेवा", rate: "दर", rows: [["जेरॉक्स", "1.00"], ["प्रिंट", "5.00"], ["पासपोर्ट फोटो", "30.00"]] },
                'bn': { title: "কামিনী ডিজিটাল", greet: "স্বাগতম!", service: "সার্ভিসের নাম", rate: "রেট (টাকায়)", rows: [["জেরক্স", "১.০০"], ["প্রিন্ট আউট", "৫.০০"], ["পাসপোর্ট ফটো", "৩০.০০"]] }
            };
            document.getElementById('title').innerText = data[lang].title;
            document.getElementById('greet').innerText = data[lang].greet;
            document.getElementById('th-service').innerText = data[lang].service;
            document.getElementById('th-rate').innerText = data[lang].rate;
            let rows = ""; data[lang].rows.forEach(r => rows += `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`);
            document.getElementById('table-body').innerHTML = rows;
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'inline-block';
        });

        document.getElementById('installBtn').addEventListener('click', () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => { document.getElementById('installBtn').style.display = 'none'; });
            }
        });

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
