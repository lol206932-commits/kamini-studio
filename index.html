        :root { --bg-color: #f4f7f6; --card-bg: #ffffff; --text-color: #2c3e50; --btn-color: #e74c3c; --shadow-color: rgba(0,0,0,0.1); }
        body { font-family: 'Poppins', 'Segoe UI', Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); text-align: center; margin: 0; padding: 10px; transition: 0.4s ease; }
        .container { background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px var(--shadow-color); max-width: 500px; margin: auto; position: relative; }
        
        #installBtn { display: none; background: #28a745; color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; margin: 0 auto 20px auto; width: 80%; max-width: 300px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-size: 16px; animation: popIn 0.5s ease; }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .my-orders-btn { position: absolute; top: 20px; right: 20px; background: #3498db; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3); transition: 0.3s; }
        .my-orders-btn:hover { background: #2980b9; transform: translateY(-2px); }

        table { width: 100%; border-collapse: collapse; margin: 15px 0; border-radius: 10px; overflow: hidden; }
        th { background-color: var(--btn-color); color: white; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid rgba(0,0,0,0.1); font-weight: bold; }
        
        .order-box { margin-top: 20px; padding: 15px; border: 2px solid var(--btn-color); border-radius: 15px; background: rgba(255,255,255,0.2); display: flex; flex-direction: column; align-items: center; }
        .book-entry { width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 10px; }
        
        .input-wrapper { display: flex; width: 85%; margin: 5px auto; align-items: center; gap: 5px; }
        .input-wrapper input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccd1d1; outline: none; font-family: inherit; transition: 0.3s; margin: 0; }
        .input-wrapper input:focus { border-color: #3498db; box-shadow: 0 0 5px rgba(52, 152, 219, 0.3); }
        
        .next-arrow-btn { background: #ecf0f1; color: #2c3e50; border: 1px solid #bdc3c7; padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 14px; display: flex; justify-content: center; align-items: center; }
        .next-arrow-btn:hover { background: #bdc3c7; }

        .customer-name-wrapper { margin-bottom: 15px; }
        #customer-name { border: 2px solid #3498db; background: #f0f8ff; font-weight: bold; }
        
        .add-more-btn { background: transparent; color: var(--text-color); border: 2px dashed var(--btn-color); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 85%; transition: 0.3s; }
        .add-more-btn:hover { background: rgba(231, 76, 60, 0.1); }
        .remove-btn { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 13px; margin-top: 5px; align-self: flex-end; margin-right: 7.5%; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        .theme-panel { margin-bottom: 15px; display: flex; justify-content: center; gap: 12px; }
        .color-dot { width: 35px; height: 35px; border-radius: 50%; border: 2px solid white; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        
        .btn-link { padding: 12px 20px; border-radius: 50px; text-decoration: none; display: inline-block; margin-top: 10px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .whatsapp-btn { background-color: #25D366; color: white; }
        .map-btn { background-color: #4285F4; color: white; }
        .lang-btn { padding: 8px 15px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; background: var(--btn-color); color: white; font-weight: bold; }
        
        #qr-section { margin-top: 25px; background: white; padding: 15px; border-radius: 15px; max-width: 250px; margin: 20px auto; color: #333; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #qr-image { width: 100%; border-radius: 10px; }

        /* "আমার অর্ডার" পেজ ডিজাইন */
        #orders-page { display: none; margin-top: 20px; text-align: left; }
        .back-btn { background: #2c3e50; color: white; padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 25px; width: 100%; box-shadow: 0 4px 10px rgba(0,0,0,0.15); font-size: 15px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .back-btn:hover { background: #1a252f; transform: translateY(-2px); }
        
        .order-history-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); border-top: 5px solid #3498db; }
        .order-history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #f0f3f4; padding-bottom: 10px; }
        .order-history-date { font-size: 13px; color: #7f8c8d; font-weight: 600; }
        
        .book-history-item { background: #f8f9fa; border: 1px solid #e1e8ed; border-radius: 10px; padding: 15px; margin-bottom: 12px; position: relative; transition: 0.3s; }
        .book-history-item:hover { border-color: #3498db; box-shadow: 0 4px 10px rgba(52, 152, 219, 0.1); }
        .book-history-item.canceled { background: #fdfefe; border-color: #ecf0f1; opacity: 0.7; }
        .book-history-item.canceled:hover { border-color: #ecf0f1; box-shadow: none; }
        
        .book-title { font-size: 16px; color: #2c3e50; font-weight: bold; margin-bottom: 5px; display: block; }
        .book-details { font-size: 13px; color: #7f8c8d; display: block; line-height: 1.4; }
        
        .btn-cancel-sm { background: white; color: #e74c3c; border: 1px solid #e74c3c; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; display: inline-block; }
        .btn-cancel-sm:hover { background: #e74c3c; color: white; }
        
        .btn-delete-sm { background: transparent; color: #7f8c8d; border: 1px dashed #bdc3c7; padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-delete-sm:hover { background: #f2f4f4; color: #34495e; border-color: #95a5a6; }
        
        .badge-canceled { background: #e74c3c; color: white; padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; display: inline-block; }
    </style>
</head>

        window.addEventListener('appinstalled', () => { installBtn.style.display = 'none'; });

        let currentLang = 'bn'; // Default Language

        // --- নতুন ভাষা পরিবর্তন করার ফাংশন ---
        function changeLanguage(lang) {
            currentLang = lang;
            
            // Text Elements Change
            const textElements = document.querySelectorAll('[data-i18n]');
            textElements.forEach(element => {
                const key = element.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    element.innerText = translations[lang][key];
                }
            });

            // Input Placeholders Change
            const inputElements = document.querySelectorAll('[data-i18n-placeholder]');
            inputElements.forEach(element => {
                const key = element.getAttribute('data-i18n-placeholder');
                if (translations[lang][key]) {
                    element.placeholder = translations[lang][key];
                }
            });

            // Update dynamically generated remove buttons
            document.querySelectorAll('.remove-btn').forEach(el => {
                el.innerText = translations[lang]['removeBtn'];
            });

            // Update toggle button depending on rate chart visibility
            const rateChart = document.getElementById('rateChartContainer');
            const toggleBtn = document.getElementById('toggleRateBtn');
            if (rateChart.style.display === 'none' || rateChart.style.display === '') {
                toggleBtn.innerText = translations[lang]['show_rates_btn'];
            } else {
                toggleBtn.innerText = translations[lang]['hide_rates_btn'];
            }

            // Re-render orders if open
            if(document.getElementById('orders-page').style.display === 'block') {
                renderOrders();
            }
        }

        function toggleRateChart() { 
            const chart = document.getElementById('rateChartContainer'); 
            const toggleBtn = document.getElementById('toggleRateBtn');
            if(chart.style.display === 'none' || chart.style.display === '') {
                chart.style.display = 'block';
                toggleBtn.innerText = translations[currentLang]['hide_rates_btn'];
            } else {
                chart.style.display = 'none';
                toggleBtn.innerText = translations[currentLang]['show_rates_btn'];
            }
        }

        // Enter key চাপলে পরের বক্সে যাওয়ার লজিক
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                if (e.target.tagName === 'INPUT' && e.target.closest('.order-box')) {
                    e.preventDefault(); 
                    let inputs = Array.from(document.querySelectorAll('.order-box input'));
                    let index = inputs.indexOf(e.target);
                    if (index > -1 && index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    } else {
                        document.getElementById('order-btn').focus();
                    }
                }
            }
        });

        // ➡️ বাটনে ক্লিক করলে পরের বক্সে যাওয়ার লজিক
        function goToNextField(btn) {
            let inputs = Array.from(document.querySelectorAll('.order-box input'));
            let currentInput = btn.previousElementSibling;
            let index = inputs.indexOf(currentInput);
            if (index > -1 && index < inputs.length - 1) {
                inputs[index + 1].focus();
            } else {
                document.getElementById('order-btn').focus();
            }
        }

        function addBookField() {
            const container = document.getElementById('all-books-container');
            const newDiv = document.createElement('div');
            newDiv.className = 'book-entry';
            newDiv.style.borderTop = '1px dashed rgba(0,0,0,0.2)';
            newDiv.style.paddingTop = '10px';
            newDiv.style.marginTop = '5px';
            
            const t = translations[currentLang];
            
            newDiv.innerHTML = `
                <div class="input-wrapper">
                    <input type="text" class="b-name" data-i18n-placeholder="bookP" placeholder="${t.bookP}" required enterkeyhint="next">
                    <button type="button" class="next-arrow-btn" onclick="goToNextField(this)">➡️</button>
                </div>
                <div class="input-wrapper">
                    <input type="text" class="w-name" data-i18n-placeholder="writerP" placeholder="${t.writerP}" enterkeyhint="next">
                    <button type="button" class="next-arrow-btn" onclick="goToNextField(this)">➡️</button>
                </div>
                <div class="input-wrapper">
                    <input type="text" class="p-name" data-i18n-placeholder="pubP" placeholder="${t.pubP}" enterkeyhint="next">
                    <button type="button" class="next-arrow-btn" onclick="goToNextField(this)">➡️</button>
                </div>
                <button class="remove-btn" onclick="this.parentElement.remove()">${t.removeBtn}</button>
            `;
            container.appendChild(newDiv);
            newDiv.querySelector('.b-name').focus();
        }

        const firebaseConfig = {
            apiKey: "AIzaSyC79rsKemc3qthh8-mJ29HM1ni7Q9mIb3Q",
            authDomain: "kamini-digital.firebaseapp.com",
            projectId: "kamini-digital",
            storageBucket: "kamini-digital.firebasestorage.app",
            messagingSenderId: "354990280556",
            appId: "1:354990280556:web:5e3bf259cdddaf7fa3ad49"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function sendOrder() {
            const customerName = document.getElementById('customer-name').value.trim();
            if (customerName === "") { alert("দয়া করে আপনার নাম লিখুন!"); return; }

            const bookEntries = document.querySelectorAll('.book-entry');
            let orderMsg = `👤 *কাস্টমারের নাম:* ${customerName}\n`; 
            let isValid = true;
            let booksArray = []; 
            let booksForLocal = []; 

            bookEntries.forEach((entry, index) => {
                const bName = entry.querySelector('.b-name').value.trim();
                const wName = entry.querySelector('.w-name').value.trim();
                const pName = entry.querySelector('.p-name').value.trim();

                if (bName !== "") {
                    booksArray.push({ book_name: bName, writer_name: wName, publisher_name: pName });
                    
                    booksForLocal.push({
                        name: bName,
                        writer: wName,
                        publisher: pName,
                        status: "active"
                    });
                    
                    let bookNum = booksArray.length;
                    orderMsg += `\n📕 *বই ${bookNum}:* ${bName}`;
                    if(wName !== "") orderMsg += `\n   লেখক: ${wName}`;
                    if(pName !== "") orderMsg += `\n   পাবলিশার: ${pName}`;
                    orderMsg += `\n`;
                    
                } else if (index === 0) { isValid = false; }
            });

            if (!isValid || booksArray.length === 0) { alert("দয়া করে অন্তত প্রথম বইয়ের নামটা অবশ্যই লিখুন!"); return; }

            db.collection("book_orders").add({
                customer_name: customerName, 
                books: booksArray, 
                total_books: booksArray.length,
                status: "pending", 
                order_time: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                saveOrderLocally(customerName, booksForLocal);

                const waLink = "https://wa.me/919019863904?text=নতুন বই অর্ডার:\n" + encodeURIComponent(orderMsg.trim());
                window.location.href = waLink; 
            }).catch(function(error) { console.error("Error: ", error); });
        }

        function saveOrderLocally(custName, booksArr) {
            let myOrders = JSON.parse(localStorage.getItem("kamini_user_orders_v2")) || [];
            const date = new Date().toLocaleString('bn-BD', { hour: '2-digit', minute:'2-digit', day: '2-digit', month: 'short', year: 'numeric' });
            myOrders.unshift({ date: date, customer: custName, books: booksArr });
            localStorage.setItem("kamini_user_orders_v2", JSON.stringify(myOrders));
        }

        function openMyOrders() {
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('orders-page').style.display = 'block';
            renderOrders();
            window.scrollTo(0, 0); 
        }

        function goBackToHome() {
            document.getElementById('orders-page').style.display = 'none';
            document.getElementById('home-page').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function renderOrders() {
            const listDiv = document.getElementById("my-orders-list-full");
            let myOrders = JSON.parse(localStorage.getItem("kamini_user_orders_v2")) || [];
            const t = translations[currentLang];
            
            if (myOrders.length === 0) {
                listDiv.innerHTML = `<div style='text-align:center; padding: 40px; color:#7f8c8d; font-size: 16px; background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);'>${t.no_orders}</div>`;
            } else {
                let html = "";
                myOrders.forEach((order, oIndex) => {
                    let booksHtml = "";

                    order.books.forEach((book, bIndex) => {
                        let isCanceled = book.status === "canceled";
                        let itemClass = isCanceled ? "book-history-item canceled" : "book-history-item";
                        
                        let actionHtml = isCanceled 
                            ? `<div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
                                 <div class="badge-canceled">${t.canceled_badge}</div>
                                 <button class="btn-delete-sm" onclick="removeSingleBook(${oIndex}, ${bIndex})">${t.delete_btn}</button>
                               </div>` 
                            : `<button class="btn-cancel-sm" onclick="cancelSingleBook(${oIndex}, ${bIndex})">${t.cancel_btn}</button>`;

                        booksHtml += `
                        <div class="${itemClass}">
                            <span class="book-title">${t.book_lbl} ${book.name}</span>
                            ${book.writer ? `<span class="book-details">${t.writer_lbl} ${book.writer}</span>` : ''}
                            ${book.publisher ? `<span class="book-details">${t.pub_lbl} ${book.publisher}</span>` : ''}
                            ${actionHtml}
                        </div>`;
                    });

                    html += `
                    <div class="order-history-card">
                        <div class="order-history-header">
                            <span class="order-history-date">🕒 ${order.date}</span>
                        </div>
                        <div style="margin-bottom: 10px; font-size: 14px; color: #34495e; font-weight: bold;">${t.name_lbl} ${order.customer}</div>
                        ${booksHtml}
                    </div>`;
                });
                listDiv.innerHTML = html;
            }
        }

        function cancelSingleBook(oIndex, bIndex) {
            let myOrders = JSON.parse(localStorage.getItem("kamini_user_orders_v2")) || [];
            let order = myOrders[oIndex];
            let book = order.books[bIndex];

            if(confirm(`আপনি কি সত্যিই "${book.name}" বইটি ক্যানসেল করতে চান?`)) {
                let cancelMsg = `❌ *বই ক্যানসেল রিকোয়েস্ট:*\n\n👤 কাস্টমার: ${order.customer}\n📅 অর্ডার সময়: ${order.date}\n\n*আমি নিচের বইটি ক্যানসেল করতে চাই:*\n📕 বই: ${book.name}`;
                if(book.writer) cancelMsg += `\n   লেখক: ${book.writer}`;
                if(book.publisher) cancelMsg += `\n   পাবলিশার: ${book.publisher}`;

                myOrders[oIndex].books[bIndex].status = "canceled";
                localStorage.setItem("kamini_user_orders_v2", JSON.stringify(myOrders));
                renderOrders(); 

                const waLink = "https://wa.me/919019863904?text=" + encodeURIComponent(cancelMsg);
                window.location.href = waLink;
            }
        }

        function removeSingleBook(oIndex, bIndex) {
            if(confirm("বইটি কি আপনার লিস্ট থেকে চিরতরে মুছে ফেলতে চান?")) {
                let myOrders = JSON.parse(localStorage.getItem("kamini_user_orders_v2")) || [];
                myOrders[oIndex].books.splice(bIndex, 1);
                
                if (myOrders[oIndex].books.length === 0) {
                    myOrders.splice(oIndex, 1);
                }
                
                localStorage.setItem("kamini_user_orders_v2", JSON.stringify(myOrders));
                renderOrders(); 
            }
        }
        
        // Initial setup on load
        changeLanguage('bn');
    </script>
</body>
</html>
