<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamini Digital</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg-color: #f0f8ff; --card-bg: #ffffff; --text-color: #2c3e50; --btn-color: #e74c3c; --shadow-color: rgba(0,0,0,0.1); }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); text-align: center; margin: 0; padding: 10px; transition: 0.4s ease; }
        .container { background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px var(--shadow-color); max-width: 500px; margin: auto; }
        
        /* ইনস্টল বাটনের ডিজাইন */
        #installBtn { display: none; background: #28a745; color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; margin: 0 auto 20px auto; width: 80%; max-width: 300px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-size: 16px; animation: popIn 0.5s ease; }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        table { width: 100%; border-collapse: collapse; margin: 15px 0; border-radius: 10px; overflow: hidden; }
        th { background-color: var(--btn-color); color: white; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid rgba(0,0,0,0.1); font-weight: bold; }
        
        .order-box { margin-top: 20px; padding: 15px; border: 2px solid var(--btn-color); border-radius: 15px; background: rgba(255,255,255,0.2); display: flex; flex-direction: column; align-items: center; }
        .book-entry { width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 10px; }
        input { width: 85%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ddd; outline: none; font-family: inherit; }
        
        .add-more-btn { background: transparent; color: var(--text-color); border: 2px dashed var(--btn-color); padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 85%; transition: 0.3s; }
        .add-more-btn:hover { background: rgba(255,255,255,0.3); }
        .remove-btn { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 13px; margin-top: 5px; align-self: flex-end; margin-right: 7.5%; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        .theme-panel { margin-bottom: 15px; display: flex; justify-content: center; gap: 12px; }
        .color-dot { width: 35px; height: 35px; border-radius: 50%; border: 2px solid white; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        
        .btn-link { padding: 12px 20px; border-radius: 50px; text-decoration: none; display: inline-block; margin-top: 10px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .whatsapp-btn { background-color: #25D366; color: white; }
        .map-btn { background-color: #4285F4; color: white; }
        .lang-btn { padding: 8px 15px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; background: var(--btn-color); color: white; font-weight: bold; }
        
        #qr-section { margin-top: 25px; background: white; padding: 15px; border-radius: 15px; max-width: 250px; margin: 20px auto; color: #333; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #qr-image { width: 100%; border-radius: 10px; }
    </style>
</head>
<body id="mainBody">

    <button id="installBtn">📲 অ্যাপটি ইনস্টল করুন</button>

    <div class="theme-panel">
        <div class="color-dot" style="background: #f0f8ff;" onclick="setTheme('#f0f8ff', '#ffffff', '#2c3e50', 'rgba(0,0,0,0.1)')"></div>
        <div class="color-dot" style="background: #2c3e50;" onclick="setTheme('#2c3e50', '#34495e', '#ffffff', 'rgba(0,0,0,0.3)')"></div>
        <div class="color-dot" style="background: #e74c3c;" onclick="setTheme('#e74c3c', '#c0392b', '#ffffff', 'rgba(0,0,0,0.3)')"></div>
    </div>

    <div class="container">
        <h1 id="title">কামিনী ডিজিটাল</h1>
        <p id="addr" style="font-weight: bold; margin-bottom: 5px;">২০ নম্বর কামিনী স্কুল লেন, হাওড়া</p>

        <button id="toggleRateBtn" style="padding: 10px 20px; background: #f39c12; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 15px; margin-bottom: 5px; width: 85%; box-shadow: 0 4px 10px rgba(0,0,0,0.1);" onclick="toggleRateChart()">📋 সার্ভিসের রেট দেখুন</button>

        <div id="rateChartContainer" style="display: none; width: 100%; transition: 0.3s ease;">
            <table>
                <thead>
                    <tr><th id="th-s">সার্ভিসের নাম</th><th id="th-r">রেট</th></tr>
                </thead>
                <tbody id="table-body">
                    <tr><td>জেরক্স (B&W)</td><td>১.০০</td></tr>
                    <tr><td>প্রিন্ট আউট (B&W)</td><td>৫.০০</td></tr>
                    <tr><td>পাসপোর্ট ফটো (৫ কপি)</td><td>৩০.০০</td></tr>
                </tbody>
            </table>
        </div>

        <a href="https://www.google.com/maps/search/?api=1&query=20+Kamini+School+Lane+Howrah" class="btn-link map-btn" id="map-btn">📍 Google Maps-এ দেখুন</a>
        <br>
        <a href="https://wa.me/919019863904" class="btn-link whatsapp-btn" id="wa-btn">🟢 WhatsApp যোগাযোগ</a>

        <div class="order-box">
            <h3 id="order-t">📚 বইয়ের অর্ডার দিন</h3>
            <div id="all-books-container" style="width: 100%;">
                <div class="book-entry">
                    <input type="text" class="b-name" placeholder="বইয়ের নাম লিখুন (বাধ্যতামূলক)..." required>
                    <input type="text" class="w-name" placeholder="লেখকের নাম (ঐচ্ছিক)...">
                    <input type="text" class="p-name" placeholder="পাবলিশারের নাম (ঐচ্ছিক)...">
                </div>
            </div>
            <button class="add-more-btn" id="add-more-btn" onclick="addBookField()">➕ আরও একটি বই যোগ করুন</button>
            <button style="padding: 12px 20px; background: #007bff; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 15px; width: 85%; box-shadow: 0 4px 10px rgba(0,0,0,0.2);" id="order-btn" onclick="sendOrder()">Order Now</button>
        </div>

        <div style="margin-top: 20px;">
            <button class="lang-btn" onclick="setLang('bn')">বাংলা</button>
            <button class="lang-btn" onclick="setLang('en')">English</button>
            <button class="lang-btn" onclick="setLang('hi')">हिन्दी</button>
        </div>
    </div>

    <div id="qr-section">
        <p id="qr-text">🔳 স্ক্যান করে অ্যাপ নিন</p>
        <img id="qr-image" src="qrcode.png" alt="QR Code">
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script>
        // --- PWA এবং অ্যাপ ইনস্টল করার কোড ---
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        if ('serviceWorker' in navigator) { 
            navigator.serviceWorker.register('sw.js').catch(err => console.log("Service Worker Error:", err)); 
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('App Installed');
                }
                deferredPrompt = null;
                installBtn.style.display = 'none';
            }
        });

        window.addEventListener('appinstalled', () => {
            installBtn.style.display = 'none';
        });
        // -------------------------------------

        let currentLangData = { 
            bookP: "বইয়ের নাম লিখুন (বাধ্যতামূলক)...", 
            writerP: "লেখকের নাম (ঐচ্ছিক)...", 
            pubP: "পাবলিশারের নাম (ঐচ্ছিক)...",
            showR: "📋 সার্ভিসের রেট দেখুন",
            hideR: "🔼 সার্ভিসের রেট লুকান",
            removeBtn: "❌ মুছে ফেলুন"
        };

        function setTheme(bg, card, text, shadow) {
            document.documentElement.style.setProperty('--bg-color', bg);
            document.documentElement.style.setProperty('--card-bg', card);
            document.documentElement.style.setProperty('--text-color', text);
            document.documentElement.style.setProperty('--shadow-color', shadow);
        }

        function setLang(lang) {
            const d = {
                'en': { title: "Kamini Digital", addr: "20, Kamini School Lane, Howrah", thS: "Service", thR: "Price", map: "📍 View on Maps", wa: "🟢 WhatsApp", orderT: "📚 Book Order", qr: "🔳 Scan for App", addBtn: "➕ Add another book", rows: [["Xerox", "1.00"], ["Print", "5.00"], ["Photo", "30.00"]], bookP: "Book Name (Required)...", writerP: "Writer's Name (Optional)...", pubP: "Publisher's Name (Optional)...", showR: "📋 View Service Rates", hideR: "🔼 Hide Service Rates", removeBtn: "❌ Remove", installT: "📲 Install App" },
                'hi': { title: "कामिनी डिजिटल", addr: "20, कामिनी स्कूल लेन, हावड़ा", thS: "सेवा", thR: "दर", map: "📍 मैप पर देखें", wa: "🟢 व्हाट्सएप", orderT: "📚 पुस्तक ऑर्डर", qr: "🔳 ऐप के लिए स्कैन", addBtn: "➕ एक और किताब जोड़ें", rows: [["जेरॉक्स", "1.00"], ["प्रिंट", "5.00"], ["फोटो", "30.00"]], bookP: "किताब का नाम (अनिवार्य)...", writerP: "लेखक का नाम (वैकल्पिक)...", pubP: "प्रकाशक का नाम (वैकल्पिक)...", showR: "📋 सेवा दरें देखें", hideR: "🔼 सेवा दरें छुपाएं", removeBtn: "❌ हटाएं", installT: "📲 ऐप इंस्टॉल करें" },
                'bn': { title: "কামিনী ডিজিটাল", addr: "২০ নম্বর কামিনী স্কুল লেন, হাওড়া", thS: "সার্ভিসের নাম", thR: "রেট", map: "📍 Google Maps-এ দেখুন", wa: "🟢 WhatsApp যোগাযোগ", orderT: "📚 বইয়ের অর্ডার দিন", qr: "🔳 স্ক্যান করে অ্যাপ নিন", addBtn: "➕ আরও একটি বই যোগ করুন", rows: [["জেরক্স", "১.০০"], ["প্রিন্ট আউট", "৫.০০"], ["পাসপোর্ট ফটো", "৩০.০০"]], bookP: "বইয়ের নাম লিখুন (বাধ্যতামূলক)...", writerP: "লেখকের নাম (ঐচ্ছিক)...", pubP: "পাবলিশারের নাম (ঐচ্ছিক)...", showR: "📋 সার্ভিসের রেট দেখুন", hideR: "🔼 সার্ভিসের রেট লুকান", removeBtn: "❌ মুছে ফেলুন", installT: "📲 অ্যাপটি ইনস্টল করুন" }
            };
            const data = d[lang];
            currentLangData = data; 

            document.getElementById('title').innerText = data.title;
            document.getElementById('addr').innerText = data.addr;
            document.getElementById('th-s').innerText = data.thS;
            document.getElementById('th-r').innerText = data.thR;
            document.getElementById('map-btn').innerText = data.map;
            document.getElementById('wa-btn').innerText = data.wa;
            document.getElementById('order-t').innerText = data.orderT;
            document.getElementById('qr-text').innerText = data.qr;
            document.getElementById('add-more-btn').innerText = data.addBtn;
            document.getElementById('installBtn').innerText = data.installT;
            
            const rateChart = document.getElementById('rateChartContainer');
            document.getElementById('toggleRateBtn').innerText = (rateChart.style.display === 'none') ? data.showR : data.hideR;
            
            document.querySelectorAll('.b-name').forEach(el => el.placeholder = data.bookP);
            document.querySelectorAll('.w-name').forEach(el => el.placeholder = data.writerP);
            document.querySelectorAll('.p-name').forEach(el => el.placeholder = data.pubP);
            document.querySelectorAll('.remove-btn').forEach(el => el.innerText = data.removeBtn);

            let rs = ""; data.rows.forEach(r => rs += `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`);
            document.getElementById('table-body').innerHTML = rs;
        }

        function toggleRateChart() {
            const chart = document.getElementById('rateChartContainer');
            const btn = document.getElementById('toggleRateBtn');
            if (chart.style.display === 'none') {
                chart.style.display = 'block';
                btn.innerText = currentLangData.hideR;
            } else {
                chart.style.display = 'none';
                btn.innerText = currentLangData.showR;
            }
        }

        function addBookField() {
            const container = document.getElementById('all-books-container');
            const newDiv = document.createElement('div');
            newDiv.className = 'book-entry';
            newDiv.style.borderTop = '1px dashed rgba(0,0,0,0.2)';
            newDiv.style.paddingTop = '10px';
            newDiv.style.marginTop = '5px';

            newDiv.innerHTML = `
                <input type="text" class="b-name" placeholder="${currentLangData.bookP}" required>
                <input type="text" class="w-name" placeholder="${currentLangData.writerP}">
                <input type="text" class="p-name" placeholder="${currentLangData.pubP}">
                <button class="remove-btn" onclick="this.parentElement.remove()">${currentLangData.removeBtn}</button>
            `;
            container.appendChild(newDiv);
        }

        const firebaseConfig = {
            apiKey: "AIzaSyC79rsKemc3qthh8-mJ29HM1ni7Q9mIb3Q",
            authDomain: "kamini-digital.firebaseapp.com",
            projectId: "kamini-digital",
            storageBucket: "kamini-digital.firebasestorage.app",
            messagingSenderId: "354990280556",
            appId: "1:354990280556:web:5e3bf259cdddaf7fa3ad49"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function sendOrder() {function sendOrder() {
            const bookEntries = document.querySelectorAll('.book-entry');
            let orderMsg = "";
            let isValid = true;
            let booksArray = []; // ফায়ারবেসে আলাদা করে ডেটা পাঠানোর জন্য

            bookEntries.forEach((entry, index) => {
                const bName = entry.querySelector('.b-name').value.trim();
                const wName = entry.querySelector('.w-name').value.trim();
                const pName = entry.querySelector('.p-name').value.trim();

                if (bName !== "") {
                    // ফায়ারবেসের জন্য আলাদা ডেটা সেভ করা হচ্ছে
                    booksArray.push({
                        book_name: bName,
                        writer_name: wName,
                        publisher_name: pName
                    });
                    
                    let bookNum = booksArray.length;
                    orderMsg += `\n📕 *বই ${bookNum}:* ${bName}`;
                    if(wName !== "") orderMsg += `\n   লেখক: ${wName}`;
                    if(pName !== "") orderMsg += `\n   পাবলিশার: ${pName}`;
                    orderMsg += `\n`;
                } else if (index === 0) {
                    isValid = false;
                }
            });

            if (!isValid || booksArray.length === 0) {
                alert("দয়া করে অন্তত প্রথম বইয়ের নামটা অবশ্যই লিখুন!");
                return;
            }

            // ফায়ারবেসে সুন্দরভাবে লিস্ট হিসেবে ডেটা সেভ করা হচ্ছে
            db.collection("book_orders").add({
                books: booksArray,
                total_books: booksArray.length,
                order_time: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                // সেভ হওয়ার পর হোয়াটসঅ্যাপে যাবে
                const waLink = "https://wa.me/919019863904?text=নতুন বই অর্ডার:\n" + encodeURIComponent(orderMsg.trim());
                window.location.href = waLink; 
            }).catch(function(error) {
                console.error("Error: ", error);
            });
        }
            const bookEntries = document.querySelectorAll('.book-entry');
            let orderMsg = "";
            let isValid = true;
            let totalBooks = 0;

            bookEntries.forEach((entry, index) => {
                const bName = entry.querySelector('.b-name').value.trim();
                const wName = entry.querySelector('.w-name').value.trim();
                const pName = entry.querySelector('.p-name').value.trim();

                if (bName !== "") {
                    totalBooks++;
                    orderMsg += `\n📕 *বই ${totalBooks}:* ${bName}`;
                    if(wName !== "") orderMsg += `\n   লেখক: ${wName}`;
                    if(pName !== "") orderMsg += `\n   পাবলিশার: ${pName}`;
                    orderMsg += `\n`;
                } else if (index === 0) {
                    isValid = false;
                }
            });

            if (!isValid || totalBooks === 0) {
                alert("দয়া করে অন্তত প্রথম বইয়ের নামটা অবশ্যই লিখুন!");
                return;
            }

            db.collection("book_orders").add({
                full_order: orderMsg.trim(),
                total_books: totalBooks,
                order_time: firebase.firestore.FieldValue.serverTimestamp()
            }).catch(function(error) {
                console.error("Error: ", error);
            });
            
            const waLink = "https://wa.me/919019863904?text=নতুন বই অর্ডার:\n" + encodeURIComponent(orderMsg.trim());
            window.location.href = waLink; 
        }
    </script>
</body>
</html>
